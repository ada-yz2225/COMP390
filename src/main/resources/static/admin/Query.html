<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Query</title>
    <link rel="stylesheet" href="/shared/query.css">
</head>
<body>
<div class="container">

    <aside class="sidebar">
        <ul>
            <li id="user-management">
                <a href="User.html">User</a>
            </li>
            <li id="file-management">
                <a href="File.html">File</a>
            </li>
            <li id="algorithm-management">
                <a href="Algorithm.html">Algorithm</a>
            </li>
            <li id="query-management" class="active">
                <a href="Query.html">Query</a>
            </li>
        </ul>
    </aside>


    <main class="content">
        <div class="search-bar">

            <div style="margin-bottom: 20px;">
                <label for="file-name">File Name: </label>
                <input type="text" id="file-name" placeholder="Enter file name">
                <button id="file-search-button">Search File</button>
            </div>


            <div>
                <label for="algorithm-name">Algorithm Name: </label>
                <input type="text" id="algorithm-name" placeholder="Enter algorithm name">
                <button id="algorithm-search-button">Search Algorithm</button>
            </div>
        </div>


        <div class="result-container">
            <div class="result-box" id="file-result-box">
                <h3>File Results:</h3>
                <ul id="file-results"></ul>
            </div>
            <div class="result-box" id="algorithm-result-box">
                <h3>Algorithm Results:</h3>
                <ul id="algorithm-results"></ul>
            </div>
        </div>

        <div id="privacy-budget-box" style="display: none;">
            <strong>Remaining Privacy Budget:</strong>
            <span id="privacy-budget-value">N/A</span>
        </div>

        <button id="toggle-conditional-query" style="display: none;">Conditional Query</button>
        <div class="conditional-query" id="conditional-query-section">
            <div id="column-filters"></div>
            <button id="add-filter">Add Filter</button>
            <div id="query-epsilon">
                <label for="epsilon">Epsilon (0 ~ 1): </label>
                <input type="number" min="0.01" max="1" step="0.1" id="epsilon">
            </div>
        </div>

        <button id="toggle-parallel-query" style="display: none;">Parallel Composition</button>
        <div class="parallel-query" id="parallel-query-section">
            <div id="parallel-columnName">
                <label for="columnName">Separate by column: </label>
                <select id="columnName"></select>
            </div>
            <div id="parallel-composition-epsilon">
                <label for="parallel-epsilon">Epsilon (0 ~ 1): </label>
                <input type="number" min="0.01" max="1" step="0.1" id="parallel-epsilon">
            </div>
            <div id="column-subsets"></div>
            <button id="add-subset">Add Subset</button>
        </div>


        <div style="margin-top: 20px; text-align: center;">
            <button id="submit-query-button" style="padding: 10px 20px; font-size: 16px;">Submit Query</button>
        </div>


        <div class="result-bar">
            <h3>Analysis Result:</h3>
            <div id="output" style="border: 1px solid #ddd; padding: 10px; min-height: 200px; background: #f9f9f9; overflow: auto;">

            </div>
        </div>
    </main>
</div>
<script src="../request.js"></script>
<script src="/shared/query.js"></script>
</body>
</html>
